name: Project CI Check

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**"]
  workflow_dispatch:
    inputs:
      deploy_ai_worker:
        description: "Deploy AI Worker from this workflow run"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      test_mode:
        description: "AI Worker deploy test mode"
        required: true
        default: "normal"
        type: choice
        options: ["normal", "healthcheck-fail"]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:memory-archives

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          MEMORY_TEXT_ENCRYPTION_KEY: ${{ secrets.MEMORY_TEXT_ENCRYPTION_KEY }}

  ai-worker-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check AI Worker changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.deploy_ai_worker }}" == "true" ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf '%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^service/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  ai-worker-docker:
    runs-on: ubuntu-latest
    needs: ai-worker-changes
    if: needs.ai-worker-changes.outputs.changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AI Worker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t ai-worker:local \
            -f service/Dockerfile service

      - name: Configure AWS credentials
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          if aws ecr describe-images \
            --repository-name $REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            >/dev/null 2>&1; then
            # Immutable ECR repositories cannot accept the same sha tag twice.
            echo "Image tag already exists in ECR. Reusing $IMAGE_TAG."
            exit 0
          fi

          docker tag ai-worker:local $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Save current Task Definition ARN (rollback 대비)
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        id: current-task
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          ARN=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        id: deploy
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: sha-${{ github.sha }}
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
          TEST_MODE: ${{ inputs.test_mode || 'normal' }}
        run: |
          # 현재 Task Definition에서 이미지만 새 태그로 교체해 새 revision 등록
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          if [ "$TEST_MODE" = "healthcheck-fail" ]; then
            # Rollback test only: keep the image intact and make ECS container health fail.
            NEW_TASK_DEF=$(echo "$NEW_TASK_DEF" | jq \
              '.containerDefinitions[0].healthCheck = {
                command: ["CMD-SHELL", "exit 1"],
                interval: 30,
                timeout: 5,
                retries: 3,
                startPeriod: 60
              }')
          fi

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "new_revision=$NEW_REVISION" >> $GITHUB_OUTPUT

          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $NEW_REVISION

      - name: Wait for deployment to stabilize
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          TEST_MODE: ${{ inputs.test_mode || 'normal' }}
        run: |
          if ! aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE; then
            if [ "$TEST_MODE" = "healthcheck-fail" ]; then
              # In rollback tests, a failed waiter can be the expected path before verification.
              echo "Service waiter failed during healthcheck-fail test. Continuing to rollback verification."
              exit 0
            fi

            exit 1
          fi
        timeout-minutes: 10

      - name: Verify ECS is running the new revision
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true')
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          EXPECTED_TASK_ARN: ${{ steps.deploy.outputs.new_revision }}
          TEST_MODE: ${{ inputs.test_mode || 'normal' }}
        run: |
          # Circuit breaker rollback can stabilize the service on the previous revision.
          CURRENT_TASK_ARN=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "Expected task definition: $EXPECTED_TASK_ARN"
          echo "Current task definition:  $CURRENT_TASK_ARN"

          if [ "$TEST_MODE" = "healthcheck-fail" ]; then
            if [ "$CURRENT_TASK_ARN" != "$EXPECTED_TASK_ARN" ]; then
              echo "Rollback confirmed: ECS stabilized on a previous task definition."
              exit 0
            fi

            echo "Rollback was not confirmed. ECS is still pointing at the failing revision."
            exit 1
          fi

          if [ "$CURRENT_TASK_ARN" != "$EXPECTED_TASK_ARN" ]; then
            echo "ECS service stabilized on a different task definition. Treating deploy as failed."
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.current-task.outputs.arn != '' && ((github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.deploy_ai_worker == 'true'))
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE }}
          PREV_TASK_ARN: ${{ steps.current-task.outputs.arn }}
        run: |
          echo "배포 실패 — $PREV_TASK_ARN 으로 롤백합니다"
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $PREV_TASK_ARN
